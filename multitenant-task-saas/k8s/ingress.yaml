apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: task-backend
spec:
  rules:
    - host: task.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: task-backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: task-frontend
                port:
                  number: 80
