apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-backend
  template:
    metadata:
      labels:
        app: task-backend
    spec:
      containers:
        - name: task-backend
          image: your-registry/task-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: task-secrets
            - configMapRef:
                name: task-config
---
apiVersion: v1
kind: Service
metadata:
  name: task-backend
spec:
  selector:
    app: task-backend
  ports:
    - port: 4000
      targetPort: 4000
